controller_manager:
  ros__parameters:
    update_rate: 250
    use_sim_time: true
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    forward_position_controller:
      type: forward_command_controller/ForwardCommandController

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: true

joint_trajectory_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - xmate_joint_1
      - xmate_joint_2
      - xmate_joint_3
      - xmate_joint_4
      - xmate_joint_5
      - xmate_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: true
    constraints:
      goal_time: 1.0
      stopped_velocity_tolerance: 0.05
      xmate_joint_1:
        goal: 0.05
      xmate_joint_2:
        goal: 0.05
      xmate_joint_3:
        goal: 0.05
      xmate_joint_4:
        goal: 0.05
      xmate_joint_5:
        goal: 0.05
      xmate_joint_6:
        goal: 0.05

forward_position_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - xmate_joint_1
      - xmate_joint_2
      - xmate_joint_3
      - xmate_joint_4
      - xmate_joint_5
      - xmate_joint_6
    interface_name: position
