# ========================================
# xMate3 MoveIt2 Servo Configuration
# ========================================

# Name of the planning group for the arm
planning_group_name: xmate3_arm

# Name of the end-effector planning group (optional)
ee_frame_name: xMate3_link6

# Name of the base frame (transforms from this frame to end-effector frame)
base_frame: xMate3_base

# Override the incoming command's frame ID
command_in_type: "unitless"  # "unitless", "speed_units"
command_out_type: "unitless"  # "unitless", "speed_units"

# Publish the joint commands here
joint_topic: "/servo_server/delta_joint_cmds"

# Subscribe to these command inputs
cartesian_command_in_topic: "/servo_server/delta_twist_cmds"
joint_command_in_topic: "/servo_server/delta_joint_cmds"

# The expected publishing rate of the command inputs (Hz)
publish_period: 0.01  # 10 ms

# Incoming commands older than this are discarded (seconds)
command_in_timeout: 0.1  # 100 ms

# Wait this much longer than the publish period before publishing
# (for smoother motion, but slightly delayed)
low_latency_mode: false

# Status checks
status_topic: "/servo_server/status"

# ========================================
# Joint limits and scaling
# ========================================

# Scale the incoming commands by this much
# Can decrease to slow down motion or increase to speed up (be careful!)
linear_scale: 0.4
rotational_scale: 0.8

# Joint scale is applied to delta joint commands
joint_scale: 0.5

# Hard stop if approaching a singularity (distance, in m)
# Zero means don't check
hard_stop_singularity_threshold: 0.0

# ========================================
# Control behavior
# ========================================

# Number of commands to keep in a queue
num_command_handling_threads: 1

# Use collision checking
use_collision_checking: false

# Type of Jacobian to use: "auto" or "manipulator"
jacobian_differentiation_method: "auto"

# ========================================
# Drift and drift compensation
# ========================================

# If the end-effector drifts beyond this threshold (meters), apply a correction
drift_correction_threshold: 0.001

# How strongly to correct drift (gain)
drift_correction_gain: 1.0

# ========================================
# Incoming joint state topic
# ========================================

# Servo must know the current joint positions
joint_state_topic: "/joint_states"

# ========================================
# Planning scene (for collision checking)
# ========================================

# If using collision checking, Servo monitors the planning scene
planning_scene_topic: "/planning_scene"
planning_scene_monitor_topic: "/planning_scene_monitor"

# ========================================
# Tolerances
# ========================================

# Stop if joint position error exceeds this (radians)
joint_tolerance: 0.1

# Stop if end-effector position error exceeds this (meters)
position_tolerance: 0.01

# Stop if end-effector orientation error exceeds this (radians)
orientation_tolerance: 0.1

# ========================================
# Debugging
# ========================================

# Log debug messages
log_outgoing_commands: false
