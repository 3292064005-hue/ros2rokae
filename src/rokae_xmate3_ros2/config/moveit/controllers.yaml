# ========================================
# xMate3 MoveIt2 Controllers Configuration
# ========================================

controller_names:
  - joint_trajectory_controller
  - forward_position_controller

# Joint Trajectory Controller - for MoveIt planning
joint_trajectory_controller:
  action_ns: follow_joint_trajectory
  type: FollowJointTrajectory
  default: true
  joints:
    - xmate_joint_1
    - xmate_joint_2
    - xmate_joint_3
    - xmate_joint_4
    - xmate_joint_5
    - xmate_joint_6

# Forward Position Controller - for direct position control
forward_position_controller:
  action_ns: follow_joint_trajectory
  type: FollowJointTrajectory
  default: false
  joints:
    - xmate_joint_1
    - xmate_joint_2
    - xmate_joint_3
    - xmate_joint_4
    - xmate_joint_5
    - xmate_joint_6
