# ========================================
# xMate3 MoveIt2 STOMP Planning Configuration
# ========================================

# Main STOMP parameters
stomp:
  # Planning group name
  group_name: xmate3_arm

  # Optimizer parameters
  optimization:
    num_timesteps: 60
    num_iterations: 40
    num_iterations_after_valid: 0
    max_rollouts: 50
    initialization_method: 1
    cost_weight: 1.0
    constraint_weight: 0.0
    convergence_threshold: 1e-5

  # Noise generation parameters
  noise:
    stddev: 0.1
    min_stddev: 0.001
    decay: 0.95

  # Timing parameters
  timing:
    num_time_steps: 60
    dt: 0.05

  # Cost functions
  cost_functions:
    - function: ObstacleDistance
      name: obstacle_distance
      weight: 1.0

    - function: Smoothness
      name: smoothness
      weight: 1.0

    - function: ToolPath
      name: tool_path
      weight: 0.0
      frame_id: xMate3_base
      position_tolerance: 0.01
      orientation_tolerance: 0.01

    - function: EndEffectorConstraint
      name: end_effector_constraint
      weight: 0.0

  # Update filter
  update_filters:
    - filter: PolynomialSmoother
      name: polynomial_smoother
      polynomial_order: 3

    - filter: UpdateEnforcer
      name: update_enforcer
      tolerance: 0.001

# Noise generator standard deviations per joint
stddev:
  xmate_joint_1: 0.02
  xmate_joint_2: 0.02
  xmate_joint_3: 0.02
  xmate_joint_4: 0.02
  xmate_joint_5: 0.02
  xmate_joint_6: 0.02

# Control cost weight - used to smooth the accelerations
control_cost_weight: 0.1

# Cost threshold - stop if we are below this cost
cost_threshold: 0.001

# The planning time limit in seconds
planning_time_limit: 2.0

# The minimum number of iterations
min_rollouts: 10

# The maximum number of iterations
max_rollouts: 50

# The number of consecutive failures before giving up
max_consecutive_failures: 5

# The number of previous rollouts to use for the initial guess
num_rollouts: 10

# Noise decay parameter
noise_decay: 0.95

# Minimum standard deviation for noise
min_noise_stddev: 0.001

# Initial noise standard deviation
initial_noise_stddev: 0.1
